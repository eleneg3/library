<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <script src="./script.js" defer></script>
    <title>Library</title>
</head>
<body>
    <div id="header">
        <button type="button" id="add-new-book">Add New Book</button>
        <dialog id="add-book-modal">
            <h2 id="modal-title">Add New Book </h2>
            <form action="./index.html" method="post" id="book-input-form">
                <label for="book-title">Enter Book Title</label>
                <input type="text" name="book-title" id="book-title" placeholder="Handmaid's Tale">
                <label for="book-author">Enter Book Author</label>
                <input type="text" name="book-author" id="book-author" placeholder="Margaret Atwood">
                <input type="radio" name="read-status" id="read-status-false" value="not-read">
                <label for="read-status-false" class="text-unchecked">Not Read Yet</label>
                <input type="radio" name="read-status" id="read-status-true" value="read">
                <label for="read-status-true" class="text-checked">Read!</label>
                <button type="submit" id="submit-button">Submit</button>
                <button type="reset" id="cancel-button">Cancel</button>
            </form>
        </dialog>
    </div>
    <div id="library">
        <div class="book"></div>
    </div>
</body>
</html>
